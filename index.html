<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Student Management System</h1>
            <button onclick="window.location.href='add.html'" class="btn btn-primary">
                ➕ Add New Student
            </button>
        </header>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search by name, email, or course..." onkeyup="searchStudents()">
            <select id="filterGrade" onchange="filterByGrade()">
                <option value="">All Grades</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="F">F</option>
            </select>
        </div>

        <div id="loading" class="loading">Loading students...</div>
        <div id="studentTableContainer" style="display: none;">
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Grade</th>
                        <th>Course</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                </tbody>
            </table>
            <div id="noStudents" class="no-students" style="display: none;">
                <p>📭 No students found</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
